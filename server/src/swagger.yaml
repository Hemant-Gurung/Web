openapi: 3.0.3
info:
  title: Restaurant API
  description: REST API for the restaurant monorepo — menu, reservations, contact, and auth.
  version: 1.0.0

servers:
  - url: http://localhost:4000/api
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Auth ──────────────────────────────────────────────────────────────────
    AuthCredentials:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@restaurant.com
        password:
          type: string
          minLength: 8
          example: "secret123"

    Admin:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: admin@restaurant.com
        createdAt:
          type: string
          format: date-time

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        admin:
          $ref: "#/components/schemas/Admin"

    # ── Menu ──────────────────────────────────────────────────────────────────
    MenuItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Margherita Pizza"
        description:
          type: string
          example: "Tomato sauce, mozzarella, basil"
        price:
          type: number
          format: float
          example: 12.5
        available:
          type: boolean
          example: true
        categoryId:
          type: integer
          example: 2
        category:
          $ref: "#/components/schemas/MenuCategory"

    MenuCategory:
      type: object
      properties:
        id:
          type: integer
          example: 2
        name:
          type: string
          example: "Pizzas"
        items:
          type: array
          items:
            $ref: "#/components/schemas/MenuItem"

    CreateCategoryBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: "Desserts"

    CreateMenuItemBody:
      type: object
      required: [name, description, price, categoryId]
      properties:
        name:
          type: string
          example: "Tiramisu"
        description:
          type: string
          example: "Classic Italian dessert"
        price:
          type: number
          format: float
          example: 7.5
        categoryId:
          type: integer
          example: 3
        available:
          type: boolean
          default: true

    UpdateMenuItemBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        available:
          type: boolean

    # ── Reservations ──────────────────────────────────────────────────────────
    ReservationStatus:
      type: string
      enum: [PENDING, CONFIRMED, CANCELLED]

    Reservation:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Jane Doe"
        email:
          type: string
          format: email
          example: jane@example.com
        phone:
          type: string
          example: "+32 470 12 34 56"
        date:
          type: string
          format: date-time
        partySize:
          type: integer
          example: 4
        notes:
          type: string
          nullable: true
          example: "Window table preferred"
        status:
          $ref: "#/components/schemas/ReservationStatus"
        createdAt:
          type: string
          format: date-time

    CreateReservationBody:
      type: object
      required: [name, email, phone, date, partySize]
      properties:
        name:
          type: string
          example: "Jane Doe"
        email:
          type: string
          format: email
          example: jane@example.com
        phone:
          type: string
          example: "+32 470 12 34 56"
        date:
          type: string
          format: date-time
          example: "2026-05-15T19:30:00.000Z"
        partySize:
          type: integer
          minimum: 1
          example: 4
        notes:
          type: string
          example: "Window table preferred"

    UpdateReservationStatusBody:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/ReservationStatus"

    # ── Contact ───────────────────────────────────────────────────────────────
    ContactMessage:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "John Smith"
        email:
          type: string
          format: email
          example: john@example.com
        message:
          type: string
          example: "Do you cater for large events?"
        createdAt:
          type: string
          format: date-time

    CreateContactMessageBody:
      type: object
      required: [name, email, message]
      properties:
        name:
          type: string
          example: "John Smith"
        email:
          type: string
          format: email
          example: john@example.com
        message:
          type: string
          example: "Do you cater for large events?"

    # ── Error ─────────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Something went wrong"
        status:
          type: integer
          example: 400

paths:
  # ── Auth ────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register the first admin account
      description: Creates an admin user. Disable this endpoint after initial setup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "201":
          description: Admin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current admin from JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"
        "401":
          description: No token or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Menu ────────────────────────────────────────────────────────────────────
  /menu:
    get:
      tags: [Menu]
      summary: List all menu categories with their available items
      responses:
        "200":
          description: Array of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuCategory"

  /menu/categories:
    post:
      tags: [Menu]
      summary: Create a menu category (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuCategory"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /menu/items:
    post:
      tags: [Menu]
      summary: Create a menu item (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuItemBody"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /menu/items/{id}:
    patch:
      tags: [Menu]
      summary: Update a menu item (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMenuItemBody"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Menu]
      summary: Delete a menu item (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Item deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Reservations ────────────────────────────────────────────────────────────
  /reservations:
    post:
      tags: [Reservations]
      summary: Book a table (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationBody"
      responses:
        "201":
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags: [Reservations]
      summary: List all reservations (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReservationStatus"
        - name: date
          in: query
          required: false
          description: Filter by date (ISO format, returns reservations for that day)
          schema:
            type: string
            format: date
            example: "2026-05-15"
      responses:
        "200":
          description: Array of reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reservations/{id}/status:
    patch:
      tags: [Reservations]
      summary: Update reservation status (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReservationStatusBody"
      responses:
        "200":
          description: Reservation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "400":
          description: Invalid status value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Contact ─────────────────────────────────────────────────────────────────
  /contact:
    post:
      tags: [Contact]
      summary: Send a contact message (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactMessageBody"
      responses:
        "201":
          description: Message saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  id:
                    type: integer
                    example: 5
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags: [Contact]
      summary: List all contact messages (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of contact messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactMessage"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
